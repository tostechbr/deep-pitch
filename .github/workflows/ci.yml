name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync          # instala projeto + grupo dev (pytest, ruff)
      - run: uv run ruff check .
      - run: uv run pytest    # exclui 'live' via addopts → keyless, verde sem secrets
